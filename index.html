<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Findalyx SYSCO — États financiers SYSCOHADA</title><style>
*{box-sizing:border-box}
:root{--navy:#172554;--blue:#224289;--orange:#FA6706;--peach:#FCEFDD;--lblue:#E9EFF7;--lgrey:#F5F5F5;--border:#E5E7EB;--green:#16904E;--red:#C0392B;--ink:#1f2937;--muted:#6b7280}
html,body{margin:0;padding:0}
body{font-family:Calibri,"Segoe UI",system-ui,sans-serif;color:var(--ink);background:var(--lgrey);-webkit-print-color-adjust:exact;print-color-adjust:exact}
#app{display:flex;min-height:100vh}
.side{width:236px;flex:none;background:var(--navy);color:#fff;display:flex;flex-direction:column;padding:16px 12px;position:sticky;top:0;height:100vh;align-self:flex-start;overflow-y:auto}
.logo{display:flex;flex-direction:column;align-items:flex-start;gap:8px;padding:12px 8px 14px}
.brand-logo{height:27px;width:auto;max-width:100%;display:block}
.brandsub{font-size:10.5px;color:#9fb0d6;padding-left:2px;letter-spacing:.2px;white-space:nowrap}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.nav .item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;color:#cbd5e1;font-size:13.5px;cursor:pointer;user-select:none}
.nav .item .ic{display:flex;width:18px;height:18px}
.nav .item .ic svg{width:18px;height:18px}
.nav .item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav .item.active{background:#fff;color:var(--navy);font-weight:600}
.nav .item.active .ic{color:var(--orange)}
.nav .sep{height:1px;background:rgba(255,255,255,.13);margin:8px 8px}
.param-fold summary{outline:none}
.fold-sum{cursor:pointer;font-size:13px;font-weight:600;color:var(--navy);list-style:none;padding:2px 0}
.fold-sum::-webkit-details-marker{display:none}
.fold-sum:before{content:"▸";color:var(--orange);margin-right:8px;font-size:11px}
.param-fold[open] .fold-sum:before{content:"▾"}
.fold-sub{font-weight:400;color:var(--muted);font-size:12px}
.pill{font-size:11px;font-weight:600;padding:2px 10px;border-radius:11px}
.pill.ok{background:#e7f4ee;color:#0f6b3c}
.pill.soon{background:#fff3e0;color:#8a4b06}
.pill.exp{background:#fdeceb;color:#a3271b}
.kv{width:100%;border-collapse:collapse;font-size:13.5px}
.kv td{padding:7px 4px;border-top:1px solid #f0f2f5}
.kv td:first-child{color:#6b7280;width:46%}
.kv td:last-child{color:#172554;font-weight:600}
.sfoot-lic{font-size:11px;color:#9fb0d6;margin-bottom:9px;padding:7px 9px;background:rgba(255,255,255,.06);border-radius:7px;line-height:1.45}
.sfoot-lic.lic-foot-soon{color:#ffd9b3;background:rgba(250,103,6,.15)}
.sfoot-lic.lic-foot-exp{color:#ffb4ab;background:rgba(192,57,43,.2)}
.sfoot{margin-top:auto;font-size:11px;color:#8595bb;padding:10px 6px;line-height:1.5}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--border);padding:11px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.top .name{font-size:15px;font-weight:600;color:var(--navy)}
.top .sub{font-size:12px;color:var(--muted)}
.top .right{display:flex;align-items:center;gap:9px}
.chip{font-size:12px;padding:4px 11px;border-radius:20px}
.chip.ok{color:var(--green);background:#e7f4ee}.chip.bad{color:var(--red);background:#fdeceb}.chip.muted{color:var(--muted);background:#eee}
.sel{padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:13px;color:var(--ink);font-family:inherit}
.btn{padding:8px 14px;border:1px solid var(--border);background:#fff;border-radius:8px;font-size:13px;cursor:pointer;color:var(--navy);font-family:inherit}
.btn:hover{background:var(--lgrey)}
.btn.primary{background:var(--orange);border-color:var(--orange);color:#fff}
.btn.primary:hover{background:#e35d04}
.btn.sm{padding:6px 11px;font-size:12.5px}
.view{padding:20px 28px 40px;width:100%}
.docHead{display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--navy);padding-bottom:12px;margin-bottom:16px}
.docHead img{height:34px;width:auto}
.dh-t{font-size:17px;font-weight:600;color:var(--navy)}
.dh-s{font-size:12px;color:var(--muted);margin-top:2px}
.hello{font-size:20px;font-weight:600;color:var(--navy)}
.subtle{font-size:13px;color:var(--muted);margin:4px 0 14px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 15px}
.kpi .l{font-size:12px;color:var(--muted)}
.kpi .v{font-size:20px;font-weight:600;color:var(--navy);margin-top:4px;font-variant-numeric:tabular-nums}
.kpi .d{font-size:12px;margin-top:3px;color:var(--muted)}
.kpi .d.up{color:var(--green)}.kpi .d.down{color:var(--red)}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.kpi-l{font-size:12px;color:var(--muted)}
.kpi-ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none}
.kpi-ic svg{width:15px;height:15px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}
.kpi{transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease}
.kpi:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(20,42,90,.14);border-color:#cfd8e6}
.kpi-i{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;margin-left:5px;border-radius:50%;background:#dbe2ee;color:#54617a;font-size:9.5px;font-weight:700;font-style:italic;cursor:help;position:relative;vertical-align:middle}
.kpi-i .tip{position:absolute;bottom:150%;left:50%;transform:translateX(-50%);background:#172554;color:#fff;font-size:11px;font-weight:400;font-style:normal;line-height:1.35;padding:7px 10px;border-radius:8px;width:max-content;max-width:200px;text-align:center;opacity:0;visibility:hidden;transition:opacity .15s;z-index:60;box-shadow:0 6px 18px rgba(0,0,0,.22);pointer-events:none}
.kpi-i .tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#172554}
.kpi-i:hover .tip{opacity:1;visibility:visible}
.stmt tbody tr[data-ref]{transition:background .12s}
.stmt tbody tr[data-ref]:hover{background:#f6f9fd}
.stmt tbody tr.rowsel{background:#fff4e6 !important;box-shadow:inset 3px 0 0 var(--orange)}
.stmt td.rf.drill{cursor:pointer;color:var(--navy)}
.stmt td.rf.drill:hover{color:var(--orange);text-decoration:underline}
.ld-overlay{position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px}
.ld-overlay.open{display:flex}
.ld-modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:82vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.ld-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;font-weight:600;color:var(--navy)}
.ld-ref{display:inline-block;background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;margin-right:7px}
.ld-x{border:0;background:#f1f3f7;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;color:#555;flex:none}
.ld-x:hover{background:#e6e9ef}
.ld-b{padding:12px 18px 18px}
.ld-empty{color:var(--muted);font-size:13px;padding:10px 2px}
.ld-hint{font-size:11.5px;color:var(--muted);margin:0 0 10px}
.chartbox{position:relative;height:220px;margin-top:4px}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:15px 17px;margin-bottom:14px}
.ct{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:10px}
.ck{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--border);font-size:13px}
.ck:first-of-type{border-top:none}
.ck.big{padding:10px 0;font-size:14px}
.ck .dot{width:9px;height:9px;border-radius:50%;flex:none}
.dot.ok{background:var(--green)}.dot.warn{background:var(--orange)}
.ckl{flex:1}.ckv{color:var(--muted);font-variant-numeric:tabular-nums}
.lnk{color:var(--orange);background:none;border:none;font-size:13px;cursor:pointer;padding:0;margin-top:10px;font-family:inherit}
.bar{height:12px;border-radius:7px;overflow:hidden;display:flex;margin:2px 0 12px}
.bar span{display:block;height:100%}
.lg{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:5px 0;border-top:1px solid var(--border)}
.lg span{display:flex;align-items:center;gap:8px}
.lg i{width:9px;height:9px;border-radius:2px;display:inline-block}
.lg b{color:var(--navy);font-variant-numeric:tabular-nums}
.actions{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.stmt{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.stmt thead th{background:var(--navy);color:#fff;font-size:12px;font-weight:600;text-align:left;padding:9px 10px}
.stmt th.num,.stmt td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.stmt td{padding:7px 10px;border-top:1px solid #eef0f3}
.stmt td.rf{color:var(--muted);font-size:11.5px;width:40px}
.stmt tr.h td{background:var(--lblue);color:var(--navy);font-size:12px;font-weight:600}
.stmt tr.tot td{background:#fafbfc;font-weight:600;color:var(--navy)}
.stmt tr.sub td{background:#fff7ee;font-weight:600;color:var(--navy)}
.stmt tr.grand td{background:var(--navy);color:#fff;font-weight:700}
.stmt tr.ov td{background:#fff7ee}
.mns{color:var(--muted)}
.gap{height:18px}
.ribbon{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px}
.ribbon.bad{background:#fdeceb;color:#a3271b;border-left:4px solid var(--red)}
.ribbon.warn{background:var(--peach);color:#8a4b06;border-left:4px solid var(--orange)}
.mini{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px}
.mini th{background:var(--lblue);color:var(--navy);text-align:left;padding:6px 8px}
.mini th.num{text-align:right}
.mini td{padding:5px 8px;border-top:1px solid #eef0f3}
.mini td.rf{color:var(--muted)}
.mini td.num{text-align:right;font-variant-numeric:tabular-nums}
.ok-card{color:var(--green);font-size:13px}
.drop{border:1.5px dashed #cbd5e1;border-radius:12px;padding:18px;text-align:center;background:#fff}
.drop.over{border-color:var(--orange);background:var(--peach)}
.dl{font-size:13px;font-weight:600;color:var(--navy)}
.di{font-size:13px;color:var(--muted);margin:6px 0 10px}
.foot-note{font-size:12px;color:var(--muted);margin-top:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.field .sel{width:100%}
.soon{text-align:center;padding:48px 20px;background:#fff;border:1px dashed #d8dde6;border-radius:14px}
.soon-i{color:var(--orange);display:flex;justify-content:center}
.soon-i svg{width:38px;height:38px}
.soon-t{font-size:18px;font-weight:600;color:var(--navy);margin-top:10px}
.soon-d{font-size:13px;color:var(--muted);max-width:520px;margin:8px auto 0;line-height:1.6}
.soon-b{display:inline-block;margin-top:14px;font-size:12px;background:var(--lblue);color:var(--navy);padding:5px 12px;border-radius:20px}
.pdfdd{position:relative;display:inline-block}
.pdfmenu{position:absolute;right:0;top:calc(100% + 5px);background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:230px;z-index:30;display:none;overflow:hidden}
.pdfmenu.open{display:block}
.pdfmenu div{padding:10px 14px;font-size:13px;color:var(--navy);cursor:pointer}
.pdfmenu div:hover{background:var(--lblue)}
.ncwrap{margin-top:10px}
.nclab{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.ncom{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--ink);resize:vertical;min-height:48px;box-sizing:border-box}
.ncom:focus{outline:none;border-color:var(--orange)}
.mtext{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--ink);resize:vertical;min-height:42px;box-sizing:border-box}
.mtext:focus{outline:none;border-color:var(--orange)}
.mnum{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:13px;font-family:inherit;color:var(--ink)}
.mnum:focus{outline:none;border-color:var(--orange)}
@media (max-width:820px){
#app{flex-direction:column}
.side{width:100%;height:auto;position:static;flex-direction:row;align-items:center;flex-wrap:nowrap;overflow-x:auto;gap:4px;padding:8px 10px}
.side .logo{padding:0 10px 0 4px;flex:none;flex-direction:row}
.side .logo .brandsub{display:none}
.side .brand-logo{height:22px}
.sfoot{display:none}
.nav{flex-direction:row;gap:4px;margin:0}
.nav .item{flex:none;white-space:nowrap;padding:7px 10px}
.nav .sep{display:none}
.top{flex-wrap:wrap;gap:8px;padding:10px 16px}
.top .right{flex-wrap:wrap}
.view{padding:16px}
.kpis{grid-template-columns:repeat(2,1fr)}
.docHead img{height:26px}
.dh-t{font-size:15px}
.stmt{font-size:11.5px}
.stmt td,.stmt th{padding:6px 6px}
.stmt select{width:130px !important}
.chartbox{height:240px}
}
@media (max-width:440px){
.kpis{grid-template-columns:1fr}
.top .ent .sub{display:none}
}
@media print{
 .side,.top{display:none!important}
 .main{background:#fff}.view{padding:0;max-width:none}
 .actions,.lnk{display:none!important}
 .stmt{font-size:10.5px;border:none}
 .card,.kpi{break-inside:avoid}
 @page{margin:13mm}
}
.lic-host{display:block!important}
.lic-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--lgrey);padding:24px}
.lic-card{background:#fff;border:1px solid var(--border);border-radius:16px;max-width:440px;width:100%;padding:30px 30px 24px;text-align:center;box-shadow:0 12px 44px rgba(0,0,0,.10)}
.lic-logobox{background:var(--navy);border-radius:11px;padding:13px 18px;display:inline-flex;margin-bottom:18px}
.lic-logobox img{height:28px;width:auto}
.lic-t{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:8px}
.lic-s{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:18px}
.lic-in{width:100%;min-height:88px;border:1px solid var(--border);border-radius:9px;padding:10px;font-family:Consolas,monospace;font-size:11.5px;resize:vertical;box-sizing:border-box}
.lic-err{color:var(--red);font-size:12.5px;min-height:17px;margin:6px 0}
.lic-btn{width:100%;margin-top:4px}
.lic-foot{font-size:12px;color:var(--muted);margin-top:16px}
.switcher{position:relative}
.sw-btn{display:flex;align-items:center;gap:8px;background:none;border:1px solid transparent;border-radius:8px;padding:4px 8px;cursor:pointer;font-family:inherit;text-align:left}
.sw-btn:hover{background:var(--lgrey)}
.sw-ent{display:flex;flex-direction:column}
.sw-ent .name{font-size:15px;font-weight:600;color:var(--navy)}
.sw-ent .sub{font-size:12px;color:var(--muted)}
.sw-ar{color:var(--muted);font-size:11px}
.sw-menu{position:absolute;left:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.14);min-width:300px;max-width:380px;z-index:40;display:none;overflow:hidden}
.sw-menu.open{display:block}
.sw-new{padding:12px 16px;font-size:13.5px;font-weight:600;color:var(--orange);cursor:pointer;border-bottom:1px solid var(--border)}
.sw-new:hover{background:var(--peach)}
.sw-list{max-height:320px;overflow-y:auto}
.sw-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 16px;cursor:pointer;border-top:1px solid #f0f2f5}
.sw-item:hover{background:var(--lblue)}
.sw-item.act{background:var(--lblue)}
.sw-i-name{font-size:13.5px;font-weight:600;color:var(--navy)}
.sw-i-sub{font-size:11.5px;color:var(--muted)}
.sw-demo{font-size:10px;background:var(--peach);color:#8a4b06;padding:1px 6px;border-radius:10px;font-weight:600;margin-left:4px}
.sw-del{color:var(--muted);font-size:12px;padding:2px 6px;border-radius:6px;cursor:pointer}
.sw-del:hover{background:#fdeceb;color:var(--red)}
.wiz-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.wz-card{background:#fff;border-radius:16px;width:100%;max-width:620px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.wz-top{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border)}
.wz-title{font-size:16px;font-weight:700;color:var(--navy)}
.wz-x{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;line-height:1}

.wz-step .wz-num{width:22px;height:22px;border-radius:50%;background:#fff;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none}

.wz-step.act .wz-num{background:var(--orange);border-color:var(--orange);color:#fff}

.wz-body{padding:22px;overflow-y:auto}
.wz-h{font-size:17px;font-weight:600;color:var(--navy);margin-bottom:6px}
.wz-sub{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:16px}
.wz-opt{font-size:11px;background:var(--lblue);color:var(--blue);padding:2px 8px;border-radius:10px;font-weight:600;vertical-align:middle}
.wz-more{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.wz-more summary{font-size:13px;color:var(--blue);cursor:pointer;font-weight:600}
.wz-drop{border:1.5px dashed #cbd5e1;border-radius:12px;padding:16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.wz-d-l{font-size:13.5px;font-weight:600;color:var(--navy)}
.wz-d-i{font-size:12.5px;color:var(--muted);flex:1;min-width:140px}
.wz-actions{display:flex;justify-content:space-between;gap:10px;padding:16px 22px;border-top:1px solid var(--border)}
.wz-recap{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.rc-row{display:flex;justify-content:space-between;gap:10px;padding:10px 14px;font-size:13px;border-top:1px solid #f0f2f5}
.rc-row:first-child{border-top:none}
.rc-k{color:var(--muted)}
.rc-v{color:var(--navy);font-weight:600;text-align:right}
.eq-ok{color:var(--green);font-weight:600}

/* ---------- Helpers ---------- */
function uf(){ return store.settings.unite==="millions"?1e6: store.settings.unite==="milliers"?1e3:1; }
function uniteLabel(){ return store.settings.unite==="millions"?"millions de FCFA": store.settings.unite==="milliers"?"milliers de FCFA":"FCFA"; }
function fmt(n){ if(n==null||!isFinite(n)) return ""; var x=Math.round(n/uf()); if(x===0) return "–"; return x.toLocaleString("fr-FR"); }
function fpct(n){ if(n==null||!isFinite(n)) return "–"; return (n>=0?"+":"")+(Math.round(n*10)/10).toLocaleString("fr-FR")+" %"; }
function fvarp(nv,n1){ if(nv==null||n1==null||!isFinite(nv)||!isFinite(n1)) return ""; if(Math.round(n1)===0) return Math.round(nv)===0?"–":"n.a."; var p=(nv-n1)/Math.abs(n1)*100; if(p>=1000||p<=-1000) return "n.a."; return (p>=0?"+":"")+(Math.round(p*10)/10).toLocaleString("fr-FR")+" %"; }
function fxParse(s){ var n=parseFloat(String(s==null?"":s).replace(/[^0-9.\-]/g,"")); return isFinite(n)?n:0; }
function formatNumStr(s){ var v=String(s==null?"":s); var neg=v.replace(/\s/g,"").charAt(0)==="-"; var d=v.replace(/[^0-9]/g,""); if(d==="") return ""; return (neg?"-":"")+Number(d).toLocaleString("fr-FR"); }
function fxFmtInput(el){ var v=String(el.value); var neg=v.replace(/\s/g,"").charAt(0)==="-"; var d=v.replace(/[^0-9]/g,""); if(d===""){ el.value=neg?"-":""; return; } var caret=el.selectionStart||0; var db=v.slice(0,caret).replace(/[^0-9]/g,"").length; var f=(neg?"-":"")+Number(d).toLocaleString("fr-FR"); el.value=f; var pos=f.length,seen=0; for(var i=0;i<f.length;i++){ if(/[0-9]/.test(f.charAt(i))){ seen++; if(seen>=db){ pos=i+1; break; } } } if(db===0) pos=neg?1:0; try{ el.setSelectionRange(pos,pos); }catch(e){} }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function vN(r){ return store.computed.N? (store.computed.N.bil[r]||0):0; }
function vN1(r){ return store.computed.N1? (store.computed.N1.bil[r]||0):0; }
function amN(r){ return store.computed.N? (store.computed.N.amort[r]||0):0; }
function amN1(r){ return store.computed.N1? (store.computed.N1.amort[r]||0):0; }
function cN(r){ return store.computed.N? (store.computed.N.cr[r]||0):0; }
function cN1(r){ return store.computed.N1? (store.computed.N1.cr[r]||0):0; }
function variation(a,b){ if(!b) return null; return (a-b)/Math.abs(b)*100; }

function recompute(){
 var ov=store.settings.overrides||{};
 store.computed.N  = store.data.N ? E.computeYear(store.data.N, ov) : null;
 store.computed.N1 = store.data.N1? E.computeYear(store.data.N1, ov): null;
}

function bilanTable(lines, withAmort){
 var head = withAmort
   ? '<tr><th>Réf</th><th>Libellé</th><th class="num">Brut</th><th class="num">Amort./dépr.</th><th class="num">Net '+store.settings.exN+'</th><th class="num">Net '+store.settings.exN1+'</th><th class="num">Var.</th></tr>'
   : '<tr><th>Réf</th><th>Libellé</th><th class="num">'+store.settings.exN+'</th><th class="num">'+store.settings.exN1+'</th><th class="num">Var.</th></tr>';
 var body = lines.map(function(L){
   if(L.k==="h") return '<tr class="h"><td colspan="'+(withAmort?7:5)+'">'+L.t+'</td></tr>';
   var cls = L.k==="t"?"tot":(L.k==="g"?"grand":"");
   var net=vN(L.r), net1=vN1(L.r);
   if(withAmort){ var am=amN(L.r), brut=net-am, amd=-am;
     return '<tr class="'+cls+'" data-ref="'+L.r+'" data-label="'+esc(L.t)+'"><td class="rf drill">'+L.r+'</td><td>'+esc(L.t)+'</td><td class="num">'+fmt(brut)+'</td><td class="num">'+fmt(amd)+'</td><td class="num">'+fmt(net)+'</td><td class="num">'+fmt(net1)+'</td><td class="num">'+fvarp(net,net1)+'</td></tr>';
   }
   return '<tr class="'+cls+'" data-ref="'+L.r+'" data-label="'+esc(L.t)+'"><td class="rf drill">'+L.r+'</td><td>'+esc(L.t)+'</td><td class="num">'+fmt(net)+'</td><td class="num">'+fmt(net1)+'</td><td class="num">'+fvarp(net,net1)+'</td></tr>';
 }).join("");

 return '<table class="stmt bil-fixed" style="table-layout:fixed;width:100%">'+cg+'<thead>'+head+'</thead><tbody>'+body+'</tbody></table>';
}

function viewDashboard(){
 var fr=vN("DF")-vN("AZ"), bfr=vN("BK")-vN("DP"), tn=vN("BU")-vN("DT");

function glToBalance(aoa){

   var jr=String(row[cJrn]==null?"":row[cJrn]).trim().toUpperCase(); var lib=cLab>=0?String(row[cLab]==null?"":row[cLab]):""; var d=toNum(row[cDeb]), c=toNum(row[cCre]);
   var o=ag[acc]; if(!o){ o=ag[acc]={anD:0,anC:0,md:0,mc:0,l:""}; }

 }

function _licB64(s){ s=String(s).replace(/\s+/g,""); var bin=atob(s); var u=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; }
function _licToday(){ var d=new Date(); function p(n){return (n<10?"0":"")+n;} return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); }
function _licDaysSince(d){ try{ return Math.floor((new Date(_licToday()+"T00:00:00")-new Date(String(d)+"T00:00:00"))/86400000); }catch(e){ return 99999; } }
var LIC_GRACE_DAYS=7;
/* --- Clé propriétaire (ECDSA, hors-ligne illimité) --- */
function verifyLicence(lic){ return (async function(){
  try{
    if(!lic||String(lic).indexOf(".")<0) return {ok:false};
    if(!window.crypto||!window.crypto.subtle) return {ok:false,nocrypto:true};
    var parts=String(lic).split("."); var payload=_licB64(parts[0]), sig=_licB64(parts[1]);
    var pub=await crypto.subtle.importKey("spki", _licB64(window.__PUBKEY__||""), {name:"ECDSA",namedCurve:"P-256"}, false, ["verify"]);
    var valid=await crypto.subtle.verify({name:"ECDSA",hash:"SHA-256"}, pub, sig, payload);
    if(!valid) return {ok:false};
    var data=JSON.parse(new TextDecoder().decode(payload));
    return {ok:true, expired:(_licToday()>String(data.exp)), customer:data.c, exp:data.exp};
  }catch(e){ return {ok:false}; }
})(); }
function _licRollback(){ try{ var ls=localStorage.getItem("fx_lastseen"), t=_licToday(); if(ls && t<ls) return true; localStorage.setItem("fx_lastseen",(ls&&ls>t)?ls:t); }catch(e){} return false; }

function verifyOnline(code){ return (async function(){
  var url=window.__SUPA_FN__||"", key=window.__SUPA_KEY__||"";
  if(!url||!key) return {net:false};
  try{
    var ctrl=("AbortController" in window)?new AbortController():null;
    var to=ctrl?setTimeout(function(){try{ctrl.abort();}catch(e){}},12000):null;
    var resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json","apikey":key,"Authorization":"Bearer "+key},body:JSON.stringify({cle:code,appareil:_licDevice()}),signal:ctrl?ctrl.signal:undefined});
    if(to)clearTimeout(to);
    var data=null; try{ data=await resp.json(); }catch(e){ data=null; }
    if(!data) return {net:false};
    return {net:true, data:data};
  }catch(e){ return {net:false}; }
})(); }

function checkLicence(lic){ return (async function(){
  lic=String(lic||"").replace(/\s+/g,"");
  if(!lic) return {ok:false, kind:"activation"};
  if(lic.indexOf(".")>=0){
    var ro=await verifyLicence(lic);
    if(ro.nocrypto) return {ok:false, kind:"nocrypto"};
    if(ro.ok && !ro.expired){ if(_licRollback()) return {ok:false, kind:"offline"}; return {ok:true, customer:ro.customer, exp:ro.exp, mode:"owner"}; }
    if(ro.ok && ro.expired) return {ok:false, kind:"expired", exp:ro.exp, customer:ro.customer};
    return {ok:false, kind:"invalid"};
  }
  var on=await verifyOnline(lic);
  if(on.net){
    var d=on.data||{};
    if(d.ok===true){ _graceSet(lic, d.client, d.expire_le); try{var ls=localStorage.getItem("fx_lastseen"),t=_licToday(); if(!ls||t>ls) localStorage.setItem("fx_lastseen",t);}catch(e){} return {ok:true, customer:d.client, exp:d.expire_le, mode:"online"}; }
    var raison=d.raison||"invalid";
    if(raison==="expire") return {ok:false, kind:"expired", exp:d.expire_le};
    if(raison==="resilie") return {ok:false, kind:"revoked"};
    if(raison==="trop_appareils") return {ok:false, kind:"toomany"};
    return {ok:false, kind:"invalid"};
  }
  var g=_graceGet();
  if(g && g.code===lic){
    if(_licToday()>String(g.exp)) return {ok:false, kind:"expired", exp:g.exp, customer:g.customer};
    if(_licDaysSince(g.last)<=LIC_GRACE_DAYS && !_licRollback()) return {ok:true, customer:g.customer, exp:g.exp, mode:"grace", last:g.last};
    return {ok:false, kind:"offline", grace:true};
  }
  return {ok:false, kind:"offline"};
})(); }
function licErrMsg(rr){
  var k=rr&&rr.kind;
  if(k==="expired") return "Ce code a déjà expiré.";
  if(k==="revoked") return "Cette licence a été suspendue. Contacte Findalyx.";
  if(k==="toomany") return "Nombre maximum d'appareils atteint pour ce code.";
  if(k==="offline") return "Pas de connexion internet — impossible de vérifier le code. Réessaie une fois connecté.";
  if(k==="nocrypto") return "Navigateur non compatible — utilise Google Chrome ou Microsoft Edge.";
  return "Code invalide — vérifie ta saisie.";
}
function _licSplash(){ try{ var el=document.getElementById("app"); if(!el) return; el.className="lic-host"; el.innerHTML='<div class="lic-wrap"><div class="lic-card"><div class="lic-logobox"><img src="'+(window.__LOGO_WHITE__||window.__LOGO__||"")+'" alt="Findalyx"/></div><div class="lic-t">Vérification de la licence…</div><div class="lic-s">Un instant, connexion au serveur Findalyx.</div></div></div>'; }catch(e){} }
function bootLicence(){
  var lic=""; try{ lic=localStorage.getItem("fx_licence")||""; }catch(e){}
  if(lic) _licSplash();
  checkLicence(lic).then(function(r){
    if(r.ok){ window.__LICINFO__={customer:r.customer, exp:r.exp, mode:r.mode, last:r.last}; var ap=document.getElementById("app"); if(ap) ap.className=""; init(); }
    else { licenceScreen(r); }
  });
}
function licenceScreen(r){
  r=r||{kind:"activation"}; var k=r.kind;
  var T={activation:"Bienvenue",invalid:"Bienvenue",expired:"Abonnement expiré",revoked:"Licence suspendue",toomany:"Trop d’appareils",offline:"Connexion requise",nocrypto:"Navigateur non compatible"};
  var title=T[k]||"Bienvenue";
  var msg;
  if(k==="expired") msg='Cet abonnement a expiré'+(r.exp?(' le <b>'+esc(r.exp)+'</b>'):'')+(r.customer?(' ('+esc(r.customer)+')'):'')+'. Saisis un nouveau code pour le renouveler.';
  else if(k==="revoked") msg='Cette licence a été suspendue. Contacte Findalyx pour la réactiver, ou saisis un autre code.';
  else if(k==="toomany") msg='Cette licence est déjà utilisée sur le nombre maximum d’appareils autorisés. Contacte Findalyx, ou saisis un autre code.';
  else if(k==="offline") msg='Findalyx doit vérifier ta licence en ligne. Connecte-toi à internet puis clique sur Réessayer.';
  else if(k==="nocrypto") msg='La clé propriétaire nécessite un navigateur récent. Ouvre l’application dans Google Chrome ou Microsoft Edge.';
  else if(k==="invalid") msg='Le code enregistré n’est plus valide. Saisis ton code d’activation Findalyx.';
  else msg='Activez votre application Findalyx SYSCO.';
  _lgnStyle();
  var el=document.getElementById("app"); el.className="lgn-host";
  el.innerHTML=
   '<div class="lgn">'+
     '<div class="lgn-brand">'+
       '<div class="lgn-glow"></div>'+
       '<img class="lgn-wlogo" src="'+(window.__LOGO_WHITE__||"")+'" alt="Findalyx"/>'+
       '<div class="lgn-hd">Vos états financiers SYSCOHADA,<br>générés en quelques minutes.</div>'+
       '<div class="lgn-card">'+lgnBullets()+'</div>'+
       '<div class="lgn-bf">Système comptable OHADA · Système Normal</div>'+
     '</div>'+
     '<div class="lgn-form"><div class="lgn-fin">'+
       '<div class="lgn-t">'+title+'</div>'+
       '<div class="lgn-s">'+msg+'</div>'+
       (k==="offline"?'<button class="lgn-btn ghost" id="licRetry">Réessayer</button>':'')+
       '<label class="lgn-lb">Code d’activation</label>'+
       '<input id="licIn" class="lgn-in" placeholder="Ex. B91791B6F406438F" autocomplete="off" autocapitalize="characters" spellcheck="false"/>'+
       '<div id="licErr" class="lgn-err"></div>'+
       '<button class="lgn-btn" id="licGo">Activer l’application</button>'+
       '<div class="lgn-help">Besoin d’un code ou d’un renouvellement ? Contacte Findalyx.</div>'+
     '</div></div>'+
   '</div>';
  var rt=document.getElementById("licRetry"); if(rt) rt.onclick=function(){ location.reload(); };
  var go=document.getElementById("licGo");
  function submit(){ var v=document.getElementById("licIn").value; go.disabled=true; go.textContent="Vérification…"; checkLicence(v).then(function(rr){ go.disabled=false; go.textContent="Activer l’application"; if(rr.ok){ try{localStorage.setItem("fx_licence", String(v).replace(/\s+/g,""));}catch(e){} location.reload(); } else { document.getElementById("licErr").textContent= licErrMsg(rr); } }); }
  if(go) go.onclick=submit;
  var inp=document.getElementById("licIn"); if(inp){ inp.addEventListener("keydown",function(e){ if(e.key==="Enter") submit(); }); setTimeout(function(){ try{inp.focus();}catch(e){} },60); }
}

  var items=["Bilan, compte de résultat, TFT et notes annexes","Conforme au SYSCOHADA révisé (Système Normal)","Détection automatique des anomalies","Export PDF et Excel en un clic"];
  var ck='<svg class="lgn-ck" viewBox="0 0 22 22" aria-hidden="true"><circle cx="11" cy="11" r="11" fill="#FA6706"/><path d="M6 11.2l3 3 6.5-6.7" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  return items.map(function(t){ return '<div class="lgn-li">'+ck+'<span>'+t+'</span></div>'; }).join("");
}
